name: Build and Push Artifacts

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: Build object and LLVM files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux-x86_64, linux-aarch64, windows-x86_64, windows-aarch64]
        mode: [debug, release]
        format: [ll, o]
        exclude:
          - mode: ${{ github.ref_name == 'main' && 'debug' || 'release' }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make xz-utils curl

      - name: Download and install tsil compiler tool
        run: |
          TSIL_VERSION=$(cat ЦІЛЬ | xargs)
          URL="https://github.com/tsil-ukr/files/raw/main/випуски-цілі/${TSIL_VERSION}/ціль-${TSIL_VERSION}-лінукс-ікс86_64.tar.xz"
          curl -L "$URL" -o tsil.tar.xz
          tar -xf tsil.tar.xz
          sudo cp "ціль-${TSIL_VERSION}-лінукс-ікс86_64/програми/ціль" /usr/local/bin/ціль
          sudo chmod +x /usr/local/bin/ціль
          rm -rf tsil.tar.xz "ціль-${TSIL_VERSION}-лінукс-ікс86_64"

      - name: Run compilation
        run: |
          chmod +x scripts/build_tsil.sh

          /bin/bash scripts/build_tsil.sh \
            "${{ matrix.mode }}" \
            "${{ matrix.platform }}" \
            "${{ matrix.format }}" \
            "/usr/local/bin/ціль" \
            "clang"

      - name: Upload matrix workspace artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}-${{ matrix.mode }}-${{ matrix.format }}
          path: будування/
          retention-days: 3

  deploy:
    name: Aggregate and push to storage repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Checkout target storage repository
        uses: actions/checkout@v4
        with:
          repository: "diysnist-static/mavka-artifacts"
          path: ".будування_репозиторій"
          ssh-key: ${{ secrets.SSH_ARTIFACTS_DEPLOY_KEY }}
          persist-credentials: true

      - name: Remove previous build paths if they exist
        run: |
          cd .будування_репозиторій
          VERSION=$(cat ../ВЕРСІЯ | xargs)

          if [ "${{ github.ref_name }}" = "main" ]; then
            TSIL_MODE="випуск"
          else
            TSIL_MODE="відлагодження"
          fi

          while IFS= read -r matrix_platform; do
            case "$matrix_platform" in
              linux-x86_64)    TSIL_FOLDER="лінукс-ікс86_64" ;;
              linux-aarch64)   TSIL_FOLDER="лінукс-аарч64" ;;
              windows-x86_64)  TSIL_FOLDER="віндовс-ікс86_64" ;;
              windows-aarch64) TSIL_FOLDER="віндовс-аарч64" ;;
            esac

            TARGET_PATH="будування/${VERSION}/${TSIL_FOLDER}/${TSIL_MODE}"

            if [ -d "$TARGET_PATH" ]; then
              git rm -rf "$TARGET_PATH" || rm -rf "$TARGET_PATH"
            fi
          done << 'EOF'
          linux-x86_64
          linux-aarch64
          windows-x86_64
          windows-aarch64
          EOF

      - name: Download all matrix build artifacts
        uses: actions/download-artifact@v4
        with:
          path: .будування_репозиторій/будування
          merge-multiple: true

      - name: Commit and push changes
        run: |
          VERSION=$(cat ВЕРСІЯ | xargs)

          cd .будування_репозиторій
          git config --local user.name "КДБ"
          git config --local user.email "prykhozhdenko@gmail.com"
          git add .

          if ! git diff-index --quiet HEAD; then
            git commit -m "Мавка $VERSION. c:${GITHUB_REF_NAME} h:${GITHUB_SHA} r:${GITHUB_RUN_NUMBER}"
          fi

      - name: Push to target repository
        uses: ad-m/github-push-action@master
        with:
          branch: main
          directory: ".будування_репозиторій"
          repository: "diysnist-static/mavka-artifacts"
          ssh: true
          github_token: ${{ secrets.SSH_ARTIFACTS_DEPLOY_KEY }}
